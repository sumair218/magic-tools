{% extends 'base.html' %}

{% block content %}

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
}

.login-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    backdrop-filter: blur(10px);
    max-width:420px;
    margin:auto;
}

.logo-circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    color:white;
    font-size:30px;
}

.auth-btn{
    border-radius:12px;
    padding:12px;
    font-weight:600;
}

.auth-primary{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    border:none;
    color:#fff;
}

.auth-secondary{
    border-radius:12px;
    padding:12px;
    font-weight:600;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.input-group .form-control {
    border-top-right-radius:0;
    border-bottom-right-radius:0;
}

.input-group .btn {
    border-top-left-radius:0;
    border-bottom-left-radius:0;
}

.divider{
    display:flex;
    align-items:center;
    text-align:center;
    margin:20px 0;
}

.divider::before,
.divider::after{
    content:'';
    flex:1;
    border-bottom:1px solid #ddd;
}

.divider span{
    padding:0 10px;
    color:#777;
}
</style>

<div class="container py-5">

<div class="row justify-content-center align-items-center">

    <div class="col-lg-5 col-md-7">

        <div class="card shadow-lg login-card">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <div class="logo-circle mb-3">
                        <i class="bi bi-file-earmark-pdf-fill"></i>
                    </div>

                    <h2 class="fw-bold">
                        Welcome Back
                    </h2>

                    <p class="text-muted">
                        Login to MagicTools
                    </p>

                </div>

                <div class="d-grid mb-3">

                    <button class="btn btn-outline-danger auth-secondary">
                        <i class="bi bi-google me-2"></i>
                        Continue with Google
                    </button>

                </div>

                <div class="d-grid">

                    <button class="btn btn-dark auth-secondary">
                        <i class="bi bi-apple me-2"></i>
                        Continue with Apple
                    </button>

                </div>

                <div class="divider">
                    <span>OR</span>
                </div>

                <form method="post">

                    {% csrf_token %}

                    {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>

                        {{ form.username }}
                        {{ form.username.errors }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <div class="input-group">
                            {{ form.password }}
                            <button type="button" class="btn btn-outline-secondary toggle-password" data-target="id_password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        {{ form.password.errors }}

                    </div>

                    <div class="d-flex justify-content-between mb-3">

                        <div class="form-check">

                            <input class="form-check-input"
                                   type="checkbox">

                            <label class="form-check-label">
                                Remember Me
                            </label>

                        </div>

                        <a href="#" class="text-decoration-none">
                            Forgot Password?
                        </a>

                    </div>

                    <button type="submit"
                            class="btn auth-primary auth-btn w-100">

                        <i class="bi bi-box-arrow-in-right me-2"></i>

                        Login

                    </button>

                </form>

                <script>
                    document.querySelectorAll('.toggle-password').forEach(function(button) {
                        button.addEventListener('click', function() {
                            var target = document.getElementById(this.dataset.target);
                            if (!target) return;
                            var icon = this.querySelector('i');
                            if (target.type === 'password') {
                                target.type = 'text';
                                icon.classList.remove('bi-eye');
                                icon.classList.add('bi-eye-slash');
                            } else {
                                target.type = 'password';
                                icon.classList.remove('bi-eye-slash');
                                icon.classList.add('bi-eye');
                            }
                        });
                    });
                </script>

                <p class="text-center mt-4">

                    Don't have an account?

                    <a href="{% url 'register' %}"
                       class="fw-bold text-decoration-none">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
