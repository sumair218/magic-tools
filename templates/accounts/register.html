{% extends 'base.html' %}

{% block content %}

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
}

.register-card,
    .login-card {
        border:none;
        border-radius:20px;
        overflow:hidden;
        max-width:420px;
        margin:auto;
    }

    .logo-circle{
        width:70px;
        height:70px;
        border-radius:50%;
        background:linear-gradient(135deg,#4f46e5,#7c3aed);
        display:flex;
        align-items:center;
        justify-content:center;
        margin:auto;
        color:white;
        font-size:30px;
    }

    .auth-btn{
        border-radius:12px;
        padding:12px;
        font-weight:600;
    }

    .auth-primary{
        background:linear-gradient(135deg,#4f46e5,#7c3aed);
        border:none;
        color:#fff;
    }

    .auth-secondary{
        border-radius:12px;
        padding:12px;
        font-weight:600;
    }

    .form-control{
        border-radius:12px;
        padding:12px;
    }

    .input-group .form-control {
        border-top-right-radius:0;
        border-bottom-right-radius:0;
    }

    .input-group .btn {
        border-top-left-radius:0;
        border-bottom-left-radius:0;
}

.btn-register:hover{
    transform:translateY(-2px);
}

.divider{
    display:flex;
    align-items:center;
    text-align:center;
    margin:20px 0;
}

.divider::before,
.divider::after{
    content:'';
    flex:1;
    border-bottom:1px solid #ddd;
}

.divider span{
    padding:0 10px;
    color:#777;
}
</style>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg register-card">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <div class="logo-circle mb-3">
                            <i class="bi bi-person-plus-fill"></i>
                        </div>

                        <h2 class="fw-bold">Create Account</h2>

                        <p class="text-muted">
                            Join MagicTools today
                        </p>

                    </div>

                    <div class="d-grid mb-3">
                        <button type="button" class="btn btn-outline-danger auth-secondary">
                            <i class="bi bi-google me-2"></i>
                            Sign up with Google
                        </button>
                    </div>

                    <div class="d-grid">
                        <button type="button" class="btn btn-dark auth-secondary">
                            <i class="bi bi-apple me-2"></i>
                            Sign up with Apple
                        </button>
                    </div>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <form method="post">

                        {% csrf_token %}

                        {{ form.non_field_errors }}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            {{ form.email }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                {{ form.password1 }}
                                <button type="button" class="btn btn-outline-secondary toggle-password" data-target="id_password1">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                {{ form.password2 }}
                                <button type="button" class="btn btn-outline-secondary toggle-password" data-target="id_password2">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn auth-primary auth-btn w-100">
                            <i class="bi bi-person-check-fill me-2"></i>
                            Create Account
                        </button>

                    </form>

                    <script>
                        document.querySelectorAll('.toggle-password').forEach(function(button) {
                            button.addEventListener('click', function() {
                                var target = document.getElementById(this.dataset.target);
                                if (!target) return;
                                var icon = this.querySelector('i');
                                if (target.type === 'password') {
                                    target.type = 'text';
                                    icon.classList.remove('bi-eye');
                                    icon.classList.add('bi-eye-slash');
                                } else {
                                    target.type = 'password';
                                    icon.classList.remove('bi-eye-slash');
                                    icon.classList.add('bi-eye');
                                }
                            });
                        });
                    </script>

                    <p class="mt-4 text-center">
                        Already have an account?

                        <a href="{% url 'login' %}"
                           class="fw-bold text-decoration-none">
                            Login
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
