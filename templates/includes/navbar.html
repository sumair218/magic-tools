{% load static %}

<nav class="navbar bg-white shadow-sm px-4">

    <div class="container-fluid">

        <button class="btn btn-link text-dark me-3 d-lg-none" type="button" id="sidebarToggle" aria-label="Toggle sidebar">
            <i class="bi bi-list fs-4"></i>
        </button>

        <!-- Search -->
        <form class="d-flex align-items-center me-auto" action="{% url 'search' %}" method="get">
            <div class="input-group input-group-sm">
                <input class="form-control" type="search" name="q" placeholder="Search tools..." aria-label="Search" required>
                <button class="btn btn-outline-secondary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </form>

        <!-- Right Side -->
        <div class="d-flex align-items-center">

            <!-- Profile Dropdown -->
            <div class="dropdown">

                <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
                   href="#"
                   role="button"
                   data-bs-toggle="dropdown">

                    <!-- Profile Image -->
                    {% if user_profile.profile_image %}
                        <img src="{{ user_profile.profile_image.url }}"
                             width="35"
                             height="35"
                             class="rounded-circle me-2"
                             alt="profile">
                    {% else %}
                        <img src="{% static 'img/default-profile.png' %}"
                             width="35"
                             height="35"
                             class="rounded-circle me-2"
                             alt="profile">
                    {% endif %}

                    <!-- Username -->
                    <span class="fw-semibold">
                        {{ request.user.username }}
                    </span>

                </a>

                <!-- Dropdown Menu -->
                <ul class="dropdown-menu dropdown-menu-end shadow">

                    <li>
                        <a class="dropdown-item" href="{% url 'profile' %}">
                            <i class="bi bi-person me-2"></i>
                            Profile
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-gear me-2"></i>
                            Account Settings
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item text-danger"
                           href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </div>

</nav>
